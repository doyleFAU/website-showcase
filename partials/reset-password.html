<section class="section auth-page">
  <div class="container auth-wrap auth-wrap--narrow">
    <div class="section-head">
      <p class="eyebrow">Your account</p>
      <h1>Choose a new password</h1>
      <p id="reset-intro">Enter a new password for your Vervio account.</p>
    </div>

    <p class="auth-message" id="reset-message" role="status"></p>

    <form class="card auth-card" id="reset-password-form" hidden>
      <label class="password-field">
        New password
        <span class="password-wrap">
          <input type="password" name="password" autocomplete="new-password" required minlength="6">
          <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M12 5C7 5 2.73 8.11 1 12.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5Zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/>
            </svg>
            <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" hidden>
              <path fill="currentColor" d="M3.27 3 2 4.27l2.9 2.9C2.73 8.11 1 11.5 1 12.5c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l3.32 3.32L21.73 21 20.46 19.73l-3.32-3.32A11.8 11.8 0 0 1 12 20c5 0 9.27-3.11 11-7.5a11.6 11.6 0 0 0-4.61-5.73L20.73 3.27ZM12 17.5a5 5 0 0 1-4.67-3.24l1.46 1.46a2.5 2.5 0 0 0 3.42 3.42l1.46 1.46A4.98 4.98 0 0 1 12 17.5Zm6.92-6.13c-.46 1.01-1.1 1.93-1.88 2.71l1.43 1.43c1.05-1.22 1.88-2.65 2.41-4.14-.73-1.85-2-3.49-3.64-4.7l-1.5 1.5c1.11.86 2 1.97 2.58 3.2Z"/>
            </svg>
          </button>
        </span>
      </label>
      <button class="btn btn-primary btn-block" type="submit">Update password</button>
    </form>

    <div class="auth-cta-row">
      <a class="btn btn-secondary btn-sm" href="login.html">Back to log in</a>
    </div>
  </div>
</section>
