<aside class="home-contact" id="contact" aria-labelledby="home-contact-title">
  <div class="card contact-form-card contact-form-card--dock" id="contact-form-wrap">
    <p class="eyebrow contact-form-dock-eyebrow">Get in touch</p>
    <h2 class="contact-form-dock-title" id="home-contact-title">Questions?</h2>

    <form class="contact-form contact-form--compact" id="contact-form" novalidate>
      <div class="contact-form-honeypot" aria-hidden="true">
        <label for="contact-company">Company</label>
        <input id="contact-company" name="company" type="text" tabindex="-1" autocomplete="off" />
      </div>

      <label class="contact-field">
        <span>Email</span>
        <input
          type="email"
          name="email"
          required
          autocomplete="email"
          inputmode="email"
          maxlength="254"
          placeholder="you@email.com"
        />
      </label>

      <label class="contact-field">
        <span>Message</span>
        <textarea
          name="message"
          rows="3"
          required
          maxlength="2000"
          placeholder="How can we help?"
        ></textarea>
      </label>

      <p class="contact-form-status" id="contact-form-status" role="status" aria-live="polite"></p>

      <button class="btn btn-primary btn-block contact-form-submit" type="submit">
        Send message
      </button>
    </form>
  </div>
</aside>
